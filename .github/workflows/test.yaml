name: Run tests and upload coverage

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - 1.25.x
        platform:
          - macos-latest
          - windows-2025
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        shell: bash
        run: |
          packages=$(go list ./... | grep -vE '/testing/e2e(/|$)')
          if [ -z "$packages" ]; then
            echo "No packages to test after filtering"
            exit 0
          fi
          go test -v -coverprofile coverage.out -covermode atomic $packages

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
